<!DOCTYPE html>
<html lang="en">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="Success.html" method="get" form="" target="_blank">
        <fieldset>
            <legend>login page  </legend>
            <label for="user">Username:</label><input type="text" name="Username" id="user" placeholder="Enter Username" required><br><br>
            <label for="pass">Password:</label><input type="password" name="Password" id="pass" placeholder="Enter Password" required maxlength="9999999"><br><br>
            <label for="email">Email:</label><input type="email" name="Email" id="email" placeholder="Enter Email" required><br><br>
            <label for="dob">Date of Birth:</label><input type="date" name="DateOfBirth" id="dob" disabled><br><br>
            <label for="phone">Phone Number:</label><input type="tel" name="PhoneNumber" id="phone" placeholder="Enter Phone Number" max="999999999"><br><br>
            <label for="gender">Gender:</label>
            <input type="radio" name="Gender" id="male" value="Male"><label for="male">Male</label>
            <input type="radio" name="Gender" id="female" value="Female"><label for="female">Female</label>
            <input type="radio" name="Gender" id="other" value="Other"><label for="other">Other</label><br><br> 
            <label for="skills" multiple>Skills:</label>
            <input type="checkbox" name="Skills" id="html" value="HTML"><label for="html" checked>HTML</label>
            <input type="checkbox" name="Skills" id="css" value="CSS"><label for="css" checked>CSS</label>
            <input type="checkbox" name="Skills" id="js" value="JavaScript"><label for="js" checked>JavaScript</label><br><br>  
        
            <label for="edu">Education:</label>
            <select name="Education" id="edu" required>
                <option value="bca" selected>BCA</option>
                <option value="bcom">Bcom</option>
                <option value="mscs">MSCS</option>
                <option value="mpcs">MSCS</option>
                <option value="PhD">PhD</option>
            </select><br><br>
            <label for="about">Feedback:</label>
            <textarea name="About" id="about" rows="4" cols="60" placeholder="Enter your feedback here..."></textarea><br><br>

            </textarea>
            <br><br>
            <input type="datetime-local" name="" id=""><br><br>
            <input type="month" name="" id=""><br><br>
            <input type="week" name="" id=""><br><br>
            <input type="url" name="" id="" placeholder="Enter URL"><br><br>
            <input type="color" name="" id=""><br><br>
            <input type="range" name="" id="" min="0" max="100"><br><br>
            <input type="number" name="" id="" min="0" max="100"><br><br>
            <input type="search" name="" id="" placeholder="Search..."><br><br>

            <input type="submit" name="Login" id="" value="Login">
            <button type="reset" >Reset</button>

        </fieldset>
    </form>
    
</body>

</html>
