<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Example</title>

    <style>
        .container {
            display: grid;
            height: 400px;
            grid-template-columns: repeat(3, 1fr); /* 3 equal columns */
            gap: 15px;
            padding: 20px;
            background-color: #d88bb9;
        }

        .container div {
            border: 1px solid black;
            padding: 20px;
            background-color: rgb(129, 235, 134);
            text-align: center;
            font-weight: bold;
        }
        div:first-child{
            /* grid-row-start: 1;
            grid-row-end: 3; */
            /* grid-column-start: 1;
            grid-column-end: 3; */
            /* grid-row:2/4 */
                grid-column:2/4;
        }
    </style>
</head>

<body>

    <div class="container">
        <div>Grid Item 1</div>
        <div>Grid Item 2</div>
        <div>Grid Item 3</div>
        <div>Grid Item 4</div>
        <div>Grid Item 5</div>
        <div>Grid Item 6</div>
    </div>

</body>
</html>
