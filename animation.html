    <style>
        .animate-text {
    font-size: 100px;
    opacity: 0;
    /* transform: translateY(30px); */
    transform: translate(40px, 40px);
    animation: animate 5s ease 5 backwards;
    }
    h1:hover {
    animation-play-state: paused;
    }

    @keyframes animate {
        to {
            font-size: 40px;
            opacity: 1;
            font-style: italic;
            color: rgb(106, 85, 224);
            /* transform: translateY(0); */
        }
    }
